<html lang="es">
  <head>
    <title>Pomodoro</title>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pomodoro" />
    <link rel="icon" href="icon.png" type="image/png" />
  </head>
  <body>
    <div class="text">
      <div id="focos">0 focos</div>
      <div id="descansos">0 descansos</div>
      <div id="descansosLargos">0 descansos largos</div>
    </div>
    <div id="clock" class="clock">00:00</div>
    <div class="buttons">
      <button id="button1" onclick="StartButton()">Iniciar</button>
      <button id="button2" class="locked" onclick="Next()">Siguiente</button>
      <button id="button3" class="" onclick="Reset()">Limpiar</button>
    </div>
  </body>
  <script src="script.js?v=1"></script>
</html>
